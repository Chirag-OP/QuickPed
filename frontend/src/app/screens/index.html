<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Will You Marry Me?</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* Global Styles */
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Raleway', sans-serif;
      background: linear-gradient(135deg, #f8d5f1, #fbc2eb, #fbc2eb);
      overflow: hidden;
      height: 100%;
      position: relative;
    }

    /* Floating Heart */
    .heart {
      position: absolute;
      top: 20%;
      left: 20%;
      width: 60px;
      height: 60px;
      background: red;
      border-radius: 50%;
      box-shadow: 0 0 15px red, 0 0 30px red;
      animation: float 3s infinite ease-in-out;
      opacity: 0.8;
      pointer-events: none;
    }

    @keyframes float {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-30px); }
    }

    /* Celebration Heart */
    .celebration-heart {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 120px;
      height: 120px;
      background: red;
      border-radius: 50%;
      box-shadow: 0 0 20px red, 0 0 40px red;
      animation: bounce 2s infinite ease-in-out;
      opacity: 0.9;
      z-index: 10;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-40px); }
    }

    /* Confetti */
    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
      opacity: 0.8;
      animation: confettiMove 5s linear infinite;
    }

    @keyframes confettiMove {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(300px, 300px) rotate(360deg); }
    }

    /* Glassmorphism Card */
    .card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      text-align: center;
      color: white;
      max-width: 400px;
      min-width: 280px;
      z-index: 10;
    }

    .card h1 {
      font-size: 3em;
      margin: 0 0 10px;
      text-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
    }

    .card p {
      font-size: 1.2em;
      margin: 0 0 20px;
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
    }

    /* Buttons */
    .buttons {
      margin-top: 30px;
    }

    .buttons button {
      padding: 15px 30px;
      font-size: 1.2em;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      position: relative;
      z-index: 10;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .buttons button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
    }

    .no-btn {
      background: #d63031;
      color: white;
      margin-right: 20px;
    }

    .yes-btn {
      background: #ff6b6b;
      color: white;
    }

    /* Cursor Sparkle */
    .cursor-sparkle {
      position: absolute;
      width: 10px;
      height: 10px;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      pointer-events: none;
      animation: sparkle 1s ease-out;
    }

    @keyframes sparkle {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      100% {
        transform: scale(10);
        opacity: 0;
      }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .card {
        max-width: 90%;
        padding: 20px;
        font-size: 1.1em;
      }
    }
  </style>
</head>
<body>
  <!-- Floating Hearts -->
  <div class="heart"></div>
  <div class="heart" style="top: 40%; left: 60%; animation-delay: 0.5s;"></div>
  <div class="heart" style="top: 70%; left: 30%; animation-delay: 1s;"></div>
  <div class="heart" style="top: 10%; left: 80%; animation-delay: 1.5s;"></div>

  <!-- Main Content -->
  <div class="card">
    <h1>Will You Marry Me? ❤️</h1>
    <p>You are the most special person in my life.</p>
    <div class="buttons">
      <button class="no-btn" onclick="moveNoButton()">😅 No</button>
      <button class="yes-btn" onclick="celebrate()">💖 Yes</button>
    </div>
  </div>

  <!-- Celebration Elements -->
  <div id="celebration" class="celebration-heart" style="display: none;"></div>
  <div id="confetti"></div>

  <!-- Cursor Sparkle -->
  <div id="cursor-sparkle" class="cursor-sparkle"></div>

  <script>
    // Move No Button
    let noBtn = document.querySelector('.no-btn');
    let noBtnRect = noBtn.getBoundingClientRect();
    let mouseX = 0, mouseY = 0;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    function moveNoButton() {
      const windowWidth = window.innerWidth;
      const windowHeight = window.innerHeight;
      const randomX = Math.random() * (windowWidth - 100) + 50;
      const randomY = Math.random() * (windowHeight - 100) + 50;
      noBtn.style.left = `${randomX}px`;
      noBtn.style.top = `${randomY}px`;
    }

    // Cursor Sparkle
    document.addEventListener('mousemove', (e) => {
      const sparkle = document.getElementById('cursor-sparkle');
      sparkle.style.left = `${e.clientX}px`;
      sparkle.style.top = `${e.clientY}px`;
      sparkle.style.display = 'block';
      setTimeout(() => sparkle.style.display = 'none', 1000);
    });

    // Celebration on Yes
    function celebrate() {
      document.getElementById('celebration').style.display = 'block';
      const confetti = document.getElementById('confetti');
      for (let i = 0; i < 100; i++) {
        const confettiEl = document.createElement('div');
        confettiEl.classList.add('confetti');
        confettiEl.style.left = `${Math.random() * 100}%`;
        confettiEl.style.animationDelay = `${Math.random() * 2}s`;
        confetti.appendChild(confettiEl);
      }

      // Celebration Heart
      const celebrationHeart = document.getElementById('celebration');
      celebrationHeart.style.animation = 'bounce 2s infinite';

      // Fullscreen message
      const celebrationMessage = document.createElement('div');
      celebrationMessage.innerHTML = `
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
          <h2 style="font-size: 3em; font-weight: 700; text-align: center; margin: 0;">❤️ Love You Too! ❤️</h2>
          <p style="font-size: 1.2em; text-align: center; margin-top: 20px;">You just made me the happiest person in the world!</p>
          <div class="celebration-heart"></div>
        </div>
      `;
      document.body.appendChild(celebrationMessage);
    }
  </script>
</body>
</html>
